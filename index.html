<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#087a45">
  <title>大運動会｜全競技攻略ガイド</title>
  <style>
    :root {
      --green-950:#063c28; --green-900:#075b38; --green-700:#07894d;
      --green-500:#19aa61; --green-100:#def5e8; --green-50:#f3fbf6;
      --yellow:#ffd83d; --yellow-soft:#fff4b9; --white:#fffef9;
      --ink:#18372c; --muted:#60756c; --red:#e94139;
      --shadow:0 10px 28px rgba(4,73,42,.14); --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#dcefe3;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;-webkit-font-smoothing:antialiased}
    button,summary{font:inherit}
    button{touch-action:manipulation}
    .deck{display:flex;width:100%;height:100dvh;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scroll-behavior:smooth;overscroll-behavior-x:contain;scrollbar-width:none}
    .deck::-webkit-scrollbar{display:none}
    .slide{position:relative;flex:0 0 100%;width:100%;height:100dvh;overflow-y:auto;scroll-snap-align:start;scroll-snap-stop:always;background:linear-gradient(180deg,#f8fff9 0%,var(--white) 42%,#eff9f2 100%);isolation:isolate}
    .slide::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(circle at 8% 10%,rgba(255,216,61,.28) 0 6px,transparent 7px),radial-gradient(circle at 91% 22%,rgba(23,170,95,.16) 0 6px,transparent 7px)}
    .inner{width:min(100%,760px);min-height:100%;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 15px calc(92px + env(safe-area-inset-bottom))}
    .topline{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .event-chip,.page-chip{display:inline-flex;align-items:center;min-height:30px;padding:5px 11px;border-radius:999px;font-size:11px;font-weight:950;letter-spacing:.05em}
    .event-chip{color:#fff;background:var(--green-900);box-shadow:0 5px 12px rgba(5,90,55,.18)}
    .page-chip{color:var(--green-900);background:#fff;border:1px solid rgba(7,137,77,.16)}
    .team-name{margin:0 0 12px;padding:9px 10px;border:2px solid rgba(7,137,77,.14);border-radius:15px;text-align:center;color:var(--green-900);background:rgba(255,255,255,.9);box-shadow:0 5px 16px rgba(5,90,55,.07);font-size:clamp(14px,4vw,19px);font-weight:950;line-height:1.35}
    .home-hero,.event-hero{position:relative;overflow:hidden;border-radius:25px;color:#fff;background:linear-gradient(135deg,var(--green-950),var(--green-700));box-shadow:var(--shadow)}
    .home-hero{padding:23px 19px 21px;margin-bottom:17px}
    .home-hero::after,.event-hero::after{content:"";position:absolute;right:-24px;bottom:-55px;width:150px;height:150px;border:14px solid rgba(255,216,61,.28);border-radius:50%}
    .eyebrow{position:relative;z-index:1;margin-bottom:5px;color:var(--yellow);font-size:12px;font-weight:950;letter-spacing:.12em}
    h1{position:relative;z-index:1;margin:0;font-size:clamp(30px,8.5vw,48px);font-weight:1000;line-height:1.08;letter-spacing:-.04em}
    .home-lead{position:relative;z-index:1;margin:11px 0 0;color:rgba(255,255,255,.9);font-size:14px;font-weight:800;line-height:1.6}
    .section-title{display:flex;align-items:center;gap:9px;margin:18px 2px 10px;color:var(--green-950);font-size:16px;font-weight:1000}
    .section-title::before{content:"";width:5px;height:22px;border-radius:99px;background:var(--yellow);box-shadow:5px 0 0 var(--green-500)}
    .timeline{display:grid;gap:9px}
    .timeline-row{position:relative;display:grid;grid-template-columns:76px 1fr auto;align-items:center;gap:10px;width:100%;min-height:66px;padding:8px 9px;border:1px solid rgba(7,137,77,.13);border-radius:17px;text-align:left;color:var(--ink);background:#fff;box-shadow:0 6px 18px rgba(5,90,55,.08);cursor:pointer}
    .timeline-row:not(.break):active{transform:scale(.99)}
    .timeline-row.break{min-height:48px;background:var(--yellow-soft);cursor:default}
    .thumb{width:76px;height:50px;object-fit:cover;object-position:top;border-radius:11px;border:1px solid #d9e6de;background:#fff}
    .break .thumb{display:grid;place-items:center;height:34px;color:#664c00;background:rgba(255,255,255,.55);font-size:22px}
    .schedule-copy{min-width:0}
    .schedule-no{display:block;margin-bottom:2px;color:var(--green-700);font-size:10px;font-weight:950;letter-spacing:.08em}
    .schedule-name{display:block;font-size:clamp(14px,4vw,17px);font-weight:1000;line-height:1.25}
    .schedule-time{display:block;margin-top:2px;color:var(--muted);font-size:11px;font-weight:800}
    .type-badge{white-space:nowrap;padding:5px 8px;border-radius:999px;color:#574000;background:var(--yellow-soft);font-size:9px;font-weight:950}
    .type-badge.selected{color:#fff;background:var(--green-700)}
    .arrow{color:var(--green-700);font-size:22px;font-weight:1000}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin:12px 2px 0;color:var(--muted);font-size:11px;font-weight:800}
    .legend span{display:inline-flex;align-items:center;gap:5px}
    .legend i{width:9px;height:9px;border-radius:50%;background:var(--yellow);display:inline-block}
    .legend .selected-dot{background:var(--green-700)}
    .event-hero{margin-bottom:13px;padding:16px 17px 18px}
    .event-head{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .event-no{color:var(--yellow);font-size:12px;font-weight:950;letter-spacing:.08em}
    .event-time{padding:5px 8px;border:1px solid rgba(255,255,255,.32);border-radius:999px;white-space:nowrap;background:rgba(255,255,255,.1);font-size:10px;font-weight:900}
    .event-hero h1{margin-top:4px;font-size:clamp(27px,7.7vw,43px)}
    .event-meta{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
    .meta-pill{padding:5px 9px;border:1px solid rgba(255,255,255,.28);border-radius:999px;background:rgba(255,255,255,.1);font-size:11px;font-weight:900}
    .meta-pill.all{color:#574000;background:var(--yellow);border-color:var(--yellow)}
    .official-card{margin:0;border:1px solid rgba(7,137,77,.14);border-radius:20px;overflow:hidden;background:#fff;box-shadow:0 8px 22px rgba(5,90,55,.1)}
    .official-image{display:block;width:100%;height:310px;object-fit:cover;object-position:top;background:#fff;cursor:zoom-in}
    .image-caption{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;color:var(--muted);background:#fff;font-size:10px;font-weight:850}
    .zoom-chip{padding:4px 7px;border:0;border-radius:999px;color:var(--green-900);background:var(--green-100);font:inherit;cursor:pointer;appearance:none;-webkit-appearance:none}
    .quick-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
    .quick{min-height:78px;padding:10px 7px;border:1px solid rgba(7,137,77,.12);border-radius:15px;text-align:center;background:#fff;box-shadow:0 5px 14px rgba(5,90,55,.07)}
    .quick-icon{display:block;margin-bottom:4px;font-size:22px}
    .quick strong{display:block;color:var(--green-950);font-size:11px;line-height:1.35}
    .quick small{display:block;margin-top:3px;color:var(--muted);font-size:9px;line-height:1.35}
    .advice-card{position:relative;margin-top:10px;padding:14px 14px 14px 49px;border:2px solid var(--yellow);border-radius:18px;background:linear-gradient(135deg,#fff9d4,#fffef8);box-shadow:0 6px 18px rgba(100,78,0,.08)}
    .advice-card::before{content:"📣";position:absolute;top:13px;left:13px;font-size:25px}
    .advice-card h3{margin:0 0 5px;color:var(--green-950);font-size:15px;font-weight:1000}
    .advice-card p{margin:0;color:#314d41;font-size:13px;font-weight:800;line-height:1.65}
    .advice-list{display:grid;gap:8px}
    .advice-point{display:grid;grid-template-columns:34px 1fr;gap:9px;align-items:start;padding:11px;border:1px solid rgba(7,137,77,.12);border-radius:15px;background:#fff}
    .advice-point .num{display:grid;width:34px;height:34px;place-items:center;border-radius:50%;color:#fff;background:var(--green-700);font-size:16px;font-weight:1000;box-shadow:0 3px 0 var(--green-950)}
    .advice-point h4{margin:0 0 3px;color:var(--green-950);font-size:13px;font-weight:1000}
    .advice-point p{margin:0;color:var(--muted);font-size:12px;font-weight:750;line-height:1.55}
    .lineup{margin-top:13px;border:1px solid rgba(7,137,77,.15);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 7px 20px rgba(5,90,55,.09)}
    .lineup>summary{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:13px 14px;list-style:none;color:#fff;background:var(--green-900);font-size:14px;font-weight:1000;cursor:pointer}
    .lineup>summary::-webkit-details-marker{display:none}
    .lineup>summary::after{content:"＋";font-size:20px}
    .lineup[open]>summary::after{content:"−"}
    .lineup-body{display:grid;gap:10px;padding:11px}
    .round{padding:11px;border:1px solid rgba(7,137,77,.12);border-radius:15px;background:var(--green-50)}
    .round-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
    .round h3{margin:0;color:var(--green-950);font-size:15px;font-weight:1000}
    .round-tag{padding:4px 7px;border-radius:999px;color:#574000;background:var(--yellow-soft);font-size:9px;font-weight:950}
    .members{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin:0;padding:0;list-style:none}
    .member{display:flex;align-items:center;min-width:0;min-height:38px;padding:4px 5px;border-radius:11px;background:#fff;font-size:clamp(9px,2.7vw,12px);font-weight:900;letter-spacing:-.03em}
    .member .n{display:grid;flex:0 0 24px;width:24px;height:24px;margin-right:4px;place-items:center;border-radius:50%;color:#fff;background:var(--green-700);font-size:12px;font-weight:1000}
    .member.king{color:#5b4200;background:var(--yellow-soft);outline:2px solid var(--yellow)}
    .member.king .n{color:#5b4200;background:var(--yellow)}
    .all-callout{display:flex;align-items:center;gap:12px;padding:14px;border:2px solid var(--yellow);border-radius:18px;background:linear-gradient(135deg,#fff9d4,#fff)}
    .all-callout .icon{font-size:31px}
    .all-callout strong{display:block;color:var(--green-950);font-size:16px;font-weight:1000}
    .all-callout span{display:block;margin-top:2px;color:var(--muted);font-size:11px;font-weight:800;line-height:1.5}
    .footer-message{margin-top:16px;padding:14px 11px;border-top:3px solid var(--green-700);text-align:center;color:var(--green-950);background:rgba(222,245,232,.72);font-size:12px;font-weight:900;line-height:1.6}
    .footer-message strong{display:block;color:var(--green-700);font-size:13px}
    .nav{position:fixed;z-index:30;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;gap:10px;min-height:65px;padding:9px 12px calc(9px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.97) 25%);pointer-events:none}
    .nav-button{display:grid;width:42px;height:42px;padding:0;place-items:center;border:0;border-radius:50%;color:#fff;background:var(--green-900);box-shadow:0 5px 14px rgba(5,90,55,.24);font-size:20px;font-weight:1000;cursor:pointer;pointer-events:auto}
    .nav-button:disabled{opacity:.25}
    .nav-status{min-width:82px;padding:9px 12px;border-radius:999px;text-align:center;color:var(--green-900);background:#fff;box-shadow:0 4px 14px rgba(5,90,55,.12);font-size:11px;font-weight:950;pointer-events:auto}
    dialog{width:min(96vw,780px);max-height:94dvh;padding:0;border:0;border-radius:18px;background:#fff;box-shadow:0 18px 60px rgba(0,0,0,.35)}
    dialog::backdrop{background:rgba(2,24,15,.82)}
    dialog.fallback-open{position:fixed;z-index:100;inset:3dvh 2vw;display:block;max-height:94dvh;overflow:auto}
    body.dialog-fallback::before{content:"";position:fixed;z-index:99;inset:0;background:rgba(2,24,15,.82)}
    .dialog-bar{position:sticky;z-index:2;top:0;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;color:#fff;background:var(--green-950);font-size:12px;font-weight:900}
    .dialog-close{width:34px;height:34px;border:0;border-radius:50%;color:var(--green-950);background:#fff;font-size:20px;font-weight:1000;cursor:pointer}
    .dialog-image{display:block;width:100%;height:auto;background:#fff}
    @media(min-width:650px){.quick-grid{grid-template-columns:repeat(3,1fr)}.advice-list{grid-template-columns:repeat(2,1fr)}.lineup-body{grid-template-columns:repeat(2,1fr)}.official-image{height:430px}.timeline{grid-template-columns:repeat(2,1fr)}}
    @media print{
      @page{size:A4 portrait;margin:8mm}
      html,body{height:auto;overflow:visible;background:#fff}.deck{display:block;height:auto;overflow:visible}.slide{width:100%;height:auto;min-height:277mm;overflow:visible;break-after:page}.slide:last-child{break-after:auto}.inner{width:100%;min-height:277mm;padding:5mm 6mm}.nav{display:none}.official-image{height:105mm}.lineup{break-inside:avoid}.lineup>summary::after{display:none}.lineup:not([open])>.lineup-body{display:grid}.team-name{font-size:12px}.event-hero{padding:10px}.event-hero h1{font-size:27px}.section-title{margin:9px 2px 5px}.advice-card,.advice-point,.quick{box-shadow:none}.footer-message{margin-top:8px}
    }
  </style>
</head>
<body>
  <main class="deck" id="deck" aria-label="大運動会 全競技攻略ガイド"></main>
  <nav class="nav" aria-label="ページ操作">
    <button class="nav-button" id="homeButton" type="button" aria-label="全体工程へ">⌂</button>
    <button class="nav-button" id="prevButton" type="button" aria-label="前のページ">‹</button>
    <div class="nav-status" id="navStatus">全体工程</div>
    <button class="nav-button" id="nextButton" type="button" aria-label="次のページ">›</button>
  </nav>
  <dialog id="imageDialog" aria-label="公式ルール画像">
    <div class="dialog-bar"><span id="dialogTitle">公式ルール画像</span><button class="dialog-close" id="dialogClose" type="button" aria-label="閉じる">×</button></div>
    <img class="dialog-image" id="dialogImage" alt="">
  </dialog>

  <script>
    const TEAM = '💚 飛べ！兵馬とヨーイどんまるズ 💚';
    const images = {
      1:'assets/event-1.png', 2:'assets/event-2.png', 3:'assets/event-3.png',
      4:'assets/event-4.png', 5:'assets/event-5.png', 6:'assets/event-6.png',
      7:'assets/event-7.png', 8:'assets/event-8.png', 9:'assets/event-9.png'
    };

    const events = [
      {no:1,title:'障害物リレー',time:'11:30〜11:55',duration:'25分',type:'selected',people:'4名 × 2組',icon:'🏃',
        quick:[['①','ぐるぐるコーン','小刻みに回る'],['②','ビッグハンド','低く運ぶ'],['③','パン食い','口で取る'],['④','玉入れ','成功率優先']],
        lead:'周りのアドバイスを受け取りつつ、自分の担当に全集中。失敗を抑え、必ず次走者へつなぐ。',
        tips:[['第1走者｜コーン','歩幅を小さくし、コーンの内側へ体を倒す。回り終わる前に次の直線を見る。'],['第2走者｜ボール運び','ボールは胸より低く。落としてもビッグハンドだけで拾い、焦って叩かない。'],['第3走者｜パン食い','最初から口の高さを合わせる。大ジャンプより、膝を使った小さな上下で狙う。'],['第4走者｜玉入れ→ゴール','強く投げず、カゴの上へ山なり。成功を最優先し、入ったら迷わずゴールへつなぐ。']],
        lineup:[
          ['1組目','先発',['かぜちゃん','ふくちゃん','ひょうま','とみー']],
          ['2組目','後発',['ヤギオ','まーべらす','まりたん','りよ']]
        ]},
      {no:2,title:'バルーンショック',time:'11:55〜12:15',duration:'20分',type:'all',people:'全員参加',icon:'🎈',
        quick:[['5秒','稼働時間','全力ストローク'],['↕','ポンプ','上まで・下まで'],['💥','勝利条件','早く割る']],
        lead:'5秒間で入る空気量を最大化する。ポンプを端から端まで動かし、全員の5秒を積み上げる。',
        tips:[['上まで上げ、下まで押す','小さく速く動かすより、ポンプを最上部から最下部まで使い切る。1回の空気量を最大にする。'],['最初から全力で刻む','5秒は短い。合図と同時に大きなストロークへ入り、途中でリズムを変えない。'],['重くなってからが勝負','後半は空気が入りポンプが重くなる。そこで浅くせず、最後の1回まで下へ押し切る。'],['次走者はタッチに集中','前走者の5秒が終わる前に構える。確実にタッチを受け、交代の空白をなくす。']]},
      {no:3,title:'シンクロタイムチャレンジ',time:'12:15〜12:35',duration:'20分',type:'all',people:'各チーム18人分',icon:'⏱️',
        quick:[['10秒','目標','体内時計で測る'],['姿勢','練習','本番の形で刻む'],['禁止','調整','感覚のまま止める']],
        lead:'全員が自分の感覚だけで10秒を再現する。合計180秒へ近づけ、お弁当を勝ち取る。',
        tips:[['日常で10秒を刻む','ストップウォッチで10秒を測り、結果を見て感覚を修正する。仕事の合間でも繰り返す。'],['本番の姿勢で練習する','立ち方や手の位置で体感は変わる。競技中と同じ姿勢で押して、10秒を体へ入れる。'],['競技中は調整しない','前の人の結果を予想して長く・短くしない。自分が練習した10秒をそのまま出す。'],['一定の基準を一つ持つ','呼吸・心のカウントなど、自分が再現しやすい基準を決める。周囲の音には合わせない。']]},
      {no:4,title:'ラッシュアワー',time:'13:15〜13:45',duration:'30分',type:'all',people:'全員参加',icon:'🕴️',
        quick:[['3〜4名','男性陣','台の外側を固定'],['先','女性陣','順番に乗る'],['最後','巨人族','全員で乗せる']],
        lead:'男性3〜4名で台を囲って土台を作る。女性陣を先に乗せ、体格の大きいメンバーは最後に全員で乗せる。',
        tips:[['男性陣が外側を固める','最初に男性3〜4名が台の外側へ入り、足を広げて踏ん張る。乗ってくる人を受け止める土台になる。'],['女性陣を先に乗せる','土台ができたら、女性陣が中央へ向かって順番に乗る。焦って同時に飛び込まない。'],['乗った人が次を支える','台の上では姿勢を低くし、外側へ手を伸ばす。次の人の腕や腰を安全に支える。'],['巨人族は最後に全員で','体格の大きいメンバーは最後。残った全員で掴み、声を合わせて一気に台へ乗せる。']]},
      {no:5,title:'王様ドッジボール',time:'13:45〜14:15',duration:'30分',type:'selected',people:'12名 × 4戦',icon:'👑',king:'ひょうま',
        quick:[['👑','王様','ひょうま'],['鉄則','攻撃','無理に投げない'],['🔄','勝ち筋','保持して回す']],
        lead:'ボール保持率を高めることが勝利の秘訣。無理に投げず、パスで相手を動かして隙だけを狙う。',
        tips:[['投げる人を先に決める','強く正確に投げられる人を主なシューターにする。誰でも取った瞬間に投げる状態をなくす。'],['他の人はパス回し役','取ったら周囲を見て、シューターや元外野へつなぐ。ボールを持つ時間を増やして主導権を握る。'],['相手を動かしてから狙う','同じ場所から無理投げしない。左右へパスし、相手の体勢や視線が崩れた瞬間だけ投げる。'],['ひょうま王を声で守る','王様の周囲は「右」「後ろ」と危険を短く共有する。王様が当たれば即終了を全員が忘れない。']],
        lineup:[
          ['1戦目','守り切る',['ひょうま','とみー','かぜちゃん','ヤギオ','まーべらす','まりたん','りよ','ふくちゃん','キャメ','たくちゃん','まさたか','レオっち']],
          ['2戦目','声を出す',['ひょうま','とみー','かぜちゃん','ヤギオ','まーべらす','まりたん','りよ','ふくちゃん','キャメ','たくちゃん','ＳＳ','小川さん']],
          ['3戦目','連携する',['ひょうま','とみー','かぜちゃん','ヤギオ','まーべらす','まりたん','りよ','ふくちゃん','キャメ','まさたか','ＳＳ','小川さん']],
          ['4戦目','最後まで',['ひょうま','とみー','かぜちゃん','ヤギオ','まーべらす','まりたん','りよ','ふくちゃん','キャメ','たくちゃん','まさたか','レオっち']]
        ]},
      {no:6,title:'綱引き',time:'14:15〜14:45',duration:'30分',type:'selected',people:'15名 × 4戦',icon:'🪢',
        quick:[['🧤','準備','手袋・滑らない靴'],['↘','姿勢','腰をまっすぐ'],['📣','合図','オーエス']],
        lead:'目標は1〜2位。開始直後に全員で低くなり、腰を伸ばした姿勢を作ってから「オーエス」で引く。',
        tips:[['開始と同時に全員低く','最優先はスタート直後の姿勢。合図で全員が同時に腰を落とし、相手より先に低い形を完成させる。'],['腰を綱へぶつける','腰が「くの字」になったら負け。腰を綱へ当てるイメージで、体をビーンと後ろへ伸ばす。'],['女性陣は低い姿勢を守る','女性陣は無理に何度も引かず、低い姿勢を崩さず支える。チームの形を固定する役割。'],['男性陣はオーエスで加える','姿勢を保ったまま、掛け声の瞬間に引く力を重ねる。手袋と滑らない靴を忘れない。']],
        lineup:[
          ['1戦目','①前方 → ⑮最後尾',['ヤギオ','ふくちゃん','りよ','小川さん','ＳＳ','かなるん','まさたか','たくちゃん','レオっち','あやちゃん','まりたん','ひょうま','とみー','まーべらす','キャメ']],
          ['2戦目','①前方 → ⑮最後尾',['わーキャプテン','なおと','ヤギオ','ふくちゃん','りよ','小川さん','かなるん','ＳＳ','まさたか','たくちゃん','あやちゃん','まりたん','とみー','まーべらす','キャメ']],
          ['3戦目','①前方 → ⑮最後尾',['ヤギオ','ふくちゃん','なおと','小川さん','ＳＳ','わーキャプテン','たくちゃん','まさたか','りよ','レオっち','まりたん','ひょうま','とみー','かぜちゃん','キャメ']],
          ['4戦目','①前方 → ⑮最後尾',['ヤギオ','ふくちゃん','なおと','小川さん','ＳＳ','たくちゃん','まさたか','レオっち','りよ','あやちゃん','まりたん','ひょうま','とみー','かぜちゃん','キャメ']]
        ]},
      {no:7,title:'ムカデリレー',time:'15:00〜15:20',duration:'20分',type:'selected',people:'5名 × 3組',icon:'👣',
        quick:[['1・2','掛け声','全員同じ'],['↻','折返し','時計回り'],['5','ゴール','最後尾で判定']],
        lead:'速くより、揃える。歩幅より、声。転ばなければ勝てる。',
        tips:[['速さより5人を揃える','最初の3歩は小さく。「いち・に」を一定にし、全員の足が合ってから少しずつ上げる。'],['全員が同じ声を出す','先頭だけに任せない。5人全員が同じタイミングで声を出し、足を上げる瞬間を一致させる。'],['折り返しは小刻みに','時計回り。先頭が急に曲がらず、外側の人が歩幅を少し広げて円を描く。'],['次の組は付け替え準備','前の組が走っている間に並び順を確認する。バンドの具体的な付け替えは当日の説明どおりに行う。']],
        lineup:[
          ['1組目','声を揃える',['まーべらす','りよ','ふくちゃん','小川さん','かなるん']],
          ['2組目','歩幅を揃える',['ヤギオ','ＳＳ','たくちゃん','まさたか','まりたん']],
          ['3組目','転ばない',['かぜちゃん','とみー','ひょうま','キャメ','あやちゃん']]
        ]},
      {no:8,title:'お邪魔玉入れ',time:'15:20〜15:40',duration:'20分',type:'all',people:'全員参加',icon:'🔴',
        quick:[['2名','お邪魔役','ビッグハンド'],['6個','ひと束','積んで渡す'],['4役','流れ','集める→投げる']],
        lead:'全員を「お邪魔・回収・6個積み・投げ手」に分ける。球を6個単位で流し、投げ手を止めない。',
        tips:[['合図まで球に触らない','開始前は触らない・集めない・持たないを徹底する。フライングで作戦を崩さない。'],['お邪魔役は2名に固定','ビッグハンドで相手の視界と投球コースを邪魔する。人やカゴへ触れず、担当以外は攻撃へ集中する。'],['回収→6個積み→投げる','周囲の球を集める人、6個を積んで渡す人、まとめて投げる人を分け、流れ作業にする。'],['邪魔されたら場所を変える','正面が塞がれたら横へ移動し、フェードアウェイ気味でもよい。6個をカゴへ置く感覚でまとめて投げる。']]},
      {no:9,title:'全員リレー',time:'15:40〜15:55',duration:'15分',type:'all',people:'全員参加｜人数確認中',icon:'🏁',
        quick:[['交互','走順','速い→遅い'],['左→右','受渡し','上から・下から'],['停止','鉄則','受けてから走る']],
        lead:'勝利の鍵はバトン渡し。速い人と遅い人を交互に置き、確実に手へ乗せてから走り出す。',
        tips:[['速い人と遅い人を交互に','速い→遅い→速い→遅いの順で配置する。前後の走力差を使い、バトンゾーンを有利に使う。'],['速い人は手前、遅い人は奥','速い人はゾーン手前で受けて長く走る。遅い人はゾーン奥で受け、走る距離を短くする。'],['左手から右手へ渡す','渡す人は左手で上から。受ける人は右手を下から出し、手のひらへ確実に乗せる。'],['走りながら渡さない','練習なしの走り渡しは失敗しやすい。受け手はバトンが手に乗ったことを確認してから走り出す。']]}
    ];

    const schedule = [
      {event:1},{event:2},{event:3},
      {break:true,title:'昼休憩｜お菓子GET競争',time:'12:35〜13:15',icon:'🍱'},
      {event:4},{event:5},{event:6},
      {break:true,title:'休憩・水分補給',time:'14:45〜15:00',icon:'🥤'},
      {event:7},{event:8},{event:9},
      {break:true,title:'水分補給 → 中締め',time:'15:55〜',icon:'🙌'}
    ];

    const esc = value => String(value).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));

    function shell(page, content, label) {
      return `<section class="slide" aria-label="${esc(label)}"><div class="inner">
        <div class="topline"><span class="event-chip">🏁 大運動会 攻略ガイド</span><span class="page-chip">${page}</span></div>
        <p class="team-name">${TEAM}</p>${content}
        <footer class="footer-message">楽しむから強い。役割があるから燃える。<strong>飛べ！兵馬とヨーイどんまるズ！</strong></footer>
      </div></section>`;
    }

    function homeSlide() {
      const rows = schedule.map(item => {
        if (item.break) return `<div class="timeline-row break"><span class="thumb">${item.icon}</span><span class="schedule-copy"><span class="schedule-no">BREAK</span><span class="schedule-name">${item.title}</span><span class="schedule-time">${item.time}</span></span><span class="type-badge">整える</span></div>`;
        const event = events[item.event-1];
        return `<button class="timeline-row" type="button" data-go="${event.no}" aria-label="第${event.no}競技 ${event.title}を開く">
          <img class="thumb" src="${images[event.no]}" alt=""><span class="schedule-copy"><span class="schedule-no">第${event.no}競技</span><span class="schedule-name">${event.title}</span><span class="schedule-time">${event.time}（${event.duration}）</span></span>
          <span>${event.type==='all'?'<span class="type-badge">全員</span>':'<span class="type-badge selected">出場表</span>'}<span class="arrow">›</span></span></button>`;
      }).join('');
      return shell('HOME', `<header class="home-hero"><div class="eyebrow">TODAY'S PROGRAM</div><h1>全競技<br>攻略ガイド</h1><p class="home-lead">時間・ルール・コツ・出場順を、<br>この1つで確認。</p></header>
        <div class="section-title">当日の全工程</div><div class="timeline">${rows}</div>
        <div class="legend"><span><i></i>全員参加</span><span><i class="selected-dot"></i>出場メンバー表あり</span><span>横スワイプでも移動できます</span></div>`, '当日の全工程');
    }

    function lineups(event) {
      if (!event.lineup) return `<div class="all-callout"><span class="icon">🙌</span><span><strong>この競技は全員参加</strong><span>自分の役割とワンポイントを確認して、チーム全体で動こう。</span></span></div>`;
      const rounds = event.lineup.map(([title,tag,names]) => `<article class="round"><div class="round-head"><h3>${title}</h3><span class="round-tag">${tag}</span></div><ol class="members">${names.map((name,i)=>`<li class="member ${event.king===name?'king':''}"><span class="n">${i+1}</span>${esc(name)}</li>`).join('')}</ol></article>`).join('');
      return `<details class="lineup" open><summary>出場メンバー・順番を確認</summary><div class="lineup-body">${rounds}</div></details>`;
    }

    function eventSlide(event) {
      const quick = event.quick.map(([icon,title,sub])=>`<div class="quick"><span class="quick-icon">${icon}</span><strong>${title}</strong><small>${sub}</small></div>`).join('');
      const tips = event.tips.map((tip,i)=>`<article class="advice-point"><span class="num">${i+1}</span><span><h4>${tip[0]}</h4><p>${tip[1]}</p></span></article>`).join('');
      const metaType = event.type==='all'?'<span class="meta-pill all">🙌 全員参加</span>':'<span class="meta-pill">📋 出場表あり</span>';
      const peopleMeta = event.type==='all' && event.people==='全員参加' ? '' : `<span class="meta-pill">${event.people}</span>`;
      return shell(`${String(event.no).padStart(2,'0')} / 09`, `<header class="event-hero"><div class="event-head"><span class="event-no">第${event.no}競技</span><span class="event-time">${event.time}｜${event.duration}</span></div><h1>${event.icon} ${event.title}</h1><div class="event-meta">${metaType}${peopleMeta}</div></header>
        <figure class="official-card"><img class="official-image" src="${images[event.no]}" alt="第${event.no}競技 ${event.title}の公式ルール画像" data-zoom="${event.no}"><figcaption class="image-caption"><span>公式ルール・会場レイアウト</span><button class="zoom-chip" type="button" data-zoom-button="${event.no}" aria-label="第${event.no}競技 ${event.title}の公式ルール画像を全体表示">タップで全体表示</button></figcaption></figure>
        <div class="section-title">30秒で確認</div><div class="quick-grid">${quick}</div>
        <div class="advice-card"><h3>この競技の勝ち筋</h3><p>${event.lead}</p></div>
        <div class="section-title">とみーのワンポイント</div><div class="advice-list">${tips}</div>
        <div class="section-title">参加・出場確認</div>${lineups(event)}`,
        `第${event.no}競技 ${event.title}`);
    }

    const deck = document.getElementById('deck');
    deck.innerHTML = homeSlide() + events.map(eventSlide).join('');
    const slides = [...document.querySelectorAll('.slide')];
    const prev = document.getElementById('prevButton');
    const next = document.getElementById('nextButton');
    const home = document.getElementById('homeButton');
    const status = document.getElementById('navStatus');
    const dialog = document.getElementById('imageDialog');
    const dialogImage = document.getElementById('dialogImage');
    const dialogTitle = document.getElementById('dialogTitle');
    let current = 0;

    function updateNav(){
      prev.disabled=current===0; next.disabled=current===slides.length-1;
      status.textContent=current===0?'全体工程':`第${current}競技 / 9`;
    }
    function goTo(index){
      current=Math.max(0,Math.min(slides.length-1,index));
      slides[current].scrollTo({top:0,behavior:'instant'});
      deck.scrollTo({left:current*deck.clientWidth,behavior:'smooth'}); updateNav();
    }
    prev.addEventListener('click',()=>goTo(current-1));
    next.addEventListener('click',()=>goTo(current+1));
    home.addEventListener('click',()=>goTo(0));
    document.querySelectorAll('[data-go]').forEach(button=>button.addEventListener('click',()=>goTo(Number(button.dataset.go))));
    deck.addEventListener('scroll',()=>{const index=Math.round(deck.scrollLeft/deck.clientWidth);if(index!==current){current=index;updateNav()}},{passive:true});
    window.addEventListener('keydown',event=>{if(event.key==='ArrowRight')goTo(current+1);if(event.key==='ArrowLeft')goTo(current-1);if(event.key==='Home')goTo(0)});
    window.addEventListener('resize',()=>deck.scrollTo({left:current*deck.clientWidth}));
    function openOfficialImage(eventNo){
      const event=events[Number(eventNo)-1];
      dialogImage.src=images[event.no];
      dialogImage.alt=`第${event.no}競技 ${event.title}の公式ルール画像`;
      dialogTitle.textContent=`第${event.no}競技｜${event.title}`;
      if(typeof dialog.showModal==='function'){
        if(!dialog.open) dialog.showModal();
      }else{
        dialog.setAttribute('open','');
        dialog.classList.add('fallback-open');
        document.body.classList.add('dialog-fallback');
      }
    }
    function closeOfficialImage(){
      if(typeof dialog.close==='function' && dialog.open) dialog.close();
      dialog.removeAttribute('open');
      dialog.classList.remove('fallback-open');
      document.body.classList.remove('dialog-fallback');
    }
    document.querySelectorAll('[data-zoom]').forEach(image=>image.addEventListener('click',()=>openOfficialImage(image.dataset.zoom)));
    document.querySelectorAll('[data-zoom-button]').forEach(button=>button.addEventListener('click',()=>openOfficialImage(button.dataset.zoomButton)));
    document.getElementById('dialogClose').addEventListener('click',closeOfficialImage);
    dialog.addEventListener('click',event=>{if(event.target===dialog)closeOfficialImage()});
    updateNav();
  </script>
</body>
</html>
